<!DOCTYPE html>
<html>
<head>
  <title>ArhamNest Academy Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }
    .card{
      max-width:400px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 2px 10px rgba(0,0,0,.2);
    }
    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      font-size:18px;
    }
    button{
      padding:12px 25px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🎓 ArhamNest Academy</h1>

  <input type="email" id="email" placeholder="Email"><br>

  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function login(){

  const email=document.getElementById("email").value;

  if(email.includes("parent")){
      window.location="parent-dashboard.html";
  }else{
      window.location="student-dashboard.html";
  }

}
</script>

</body>
</html>
