<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArhamNest Academy - Login</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:#fff;
      padding:30px;
      width:90%;
      max-width:400px;
      border-radius:15px;
      box-shadow:0 4px 15px rgba(0,0,0,0.15);
      text-align:center;
    }

    h1{
      color:#1565c0;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#1565c0;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0d47a1;
    }

    #msg{
      margin-top:15px;
      color:red;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🎓 ArhamNest Academy</h1>

  <input
    type="email"
    id="email"
    placeholder="Enter Email"
    required
  >

  <input
    type="password"
    id="password"
    placeholder="Enter Password"
    required
  >

  <button id="loginBtn">
    Login
  </button>

  <p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyArYnOe3B9CX0IuETghXY6VcPf0WZwrxsU",
  authDomain: "arhamnest-academy.firebaseapp.com",
  projectId: "arhamnest-academy",
  storageBucket: "arhamnest-academy.firebasestorage.app",
  messagingSenderId: "312150558789",
  appId: "1:312150558789:web:532a544739f2f524a7bb2c",
  measurementId: "G-GT5NPV4XJB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.textContent = "";

  try {

    await signInWithEmailAndPassword(auth, email, password);

// Save the logged-in email for use on other pages
localStorage.setItem("userEmail", email);

// Redirect based on role
if (email.toLowerCase().includes("parent")) {
  window.location.href = "parent.html";
} else if (email.toLowerCase().includes("teacher")) {
  window.location.href = "teacher.html";
} else {
  window.location.href = "student.html";
}

  } catch (error) {
    msg.textContent = "❌ " + error.message;
  }

});

</script>

</body>
</html>
