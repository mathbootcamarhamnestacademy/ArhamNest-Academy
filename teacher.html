<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - ArhamNest Academy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header style="background:#1565c0;color:white;padding:20px;text-align:center;">
  <h1>👨‍🏫 Teacher Dashboard</h1>
</header>

<div style="max-width:700px;margin:auto;padding:20px;">

  <h2>Teacher Login</h2>

  <input type="text"
         placeholder="Username"
         style="width:100%;padding:12px;margin-bottom:10px;">

  <input type="password"
         placeholder="Password"
         style="width:100%;padding:12px;margin-bottom:20px;">

  <button style="width:100%;padding:15px;font-size:18px;">
    Login
  </button>

  <hr style="margin:30px 0;">

  <h2>Future Features</h2>
  <ul>
    <li>✅ View all students</li>
    <li>✅ Track daily progress</li>
    <li>✅ Generate reports</li>
    <li>✅ Download certificates</li>
    <li>✅ Monitor mental math performance</li>
  </ul>

  <br>

  <button onclick="location.href='index.html'"
          style="width:100%;padding:15px;">
    🏠 Back to Home
  </button>

</div>

</body>
</html>
