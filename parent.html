<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Login - ArhamNest Academy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header style="background:#1565c0;color:white;padding:20px;text-align:center;">
  <h1>👨‍👩‍👧 Parent Portal</h1>
</header>

<div style="max-width:700px;margin:auto;padding:20px;">

  <h2>Login with Mobile Number</h2>

  <input
    type="tel"
    placeholder="Enter Mobile Number"
    style="width:100%;padding:12px;margin-bottom:15px;">

  <button
    style="width:100%;padding:15px;font-size:18px;"
    onclick="alert('Parent dashboard coming soon!')">
    Login
  </button>

  <hr style="margin:30px 0;">

  <h2>Upcoming Features</h2>
  <ul>
    <li>📊 Daily practice reports</li>
    <li>🏆 Achievement certificates</li>
    <li>📈 Progress tracking</li>
    <li>🧠 Mental math performance</li>
    <li>📅 Practice history</li>
  </ul>

  <br>

  <button
    onclick="location.href='index.html'"
    style="width:100%;padding:15px;">
    🏠 Back to Home
  </button>

</div>

</body>
</html>
